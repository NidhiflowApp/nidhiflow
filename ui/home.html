<!DOCTYPE html>
<html>

<head>
    <title>NidhiFlow | Home</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <div class="app-bg">

        <!-- TOP RIGHT : USER + CLOCK -->
        <div style="
    position:absolute;
    top:22px;
    right:26px;
    display:flex;
    align-items:center;
    gap:22px;
    color:#e5e7eb;
    font-size:14px;
  ">

            <!-- USER INFO -->
            <div style="text-align:right;">
                <div style="font-weight:600;">Venugopal</div>
                <div style="font-size:12px; opacity:0.8; cursor:pointer;">
                    Logout
                </div>
            </div>

            <!-- CLOCK -->
            <div class="digital-clock" style="position:static;">
                <div id="digitalTime" class="time"></div>
                <div id="digitalDate" class="date"></div>
            </div>

        </div>

        <!-- MAIN GLASS CONTAINER -->
        <div class="app-card" style="max-width:980px;">

            <!-- APP NAME -->
            <div class="brand" style="margin-bottom:40px;">
                NidhiFlow
            </div>

            <!-- DASHBOARD GRID -->
            <div class="dashboard-grid">

                <!-- PERSONAL BUDGET CARD -->
                <div class="dashboard-card budget-card" onclick="goToPersonal()">

                    <div class="dashboard-title">Personal Budget</div>

                    <!-- ANIMATED ICON -->
                    <div class="icon-animation house-icon">
                        🏠
                    </div>


                    <div class="dashboard-desc">
                        Track income, expenses, and monthly savings with clarity.
                    </div>

                </div>

                <!-- TRIP BUDGET CARD -->
                <div class="dashboard-card trip-card" onclick="goToTrip()">

                    <div class="dashboard-title">Trip Budget</div>

                    <!-- ANIMATED ICON -->
                    <div class="icon-animation car-icon">
                        🚗
                    </div>



                    <div class="dashboard-desc">
                        Manage trip expenses, contributors, and per-person settlement.
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="../logic/clock.js"></script>

    <script>
        function goToPersonal() {
            alert("Navigate to Personal Budget");
        }

        function goToTrip() {
            alert("Navigate to Trip Budget");
        }
    </script>

</body>

</html>
